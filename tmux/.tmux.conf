# ---- core ----
unbind C-b
set -g prefix C-t
bind C-t send-prefix

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,alacritty:RGB"
set -sg escape-time 0
set -g history-limit 5000
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g focus-events on
set -g allow-passthrough on
set -g set-clipboard on
setw -g mode-keys vi

# ---- splits (inherit cwd) ----
bind | split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"

# ---- windows ----
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# ---- panes ----
bind q display-panes
bind x kill-pane

# ---- misc ----
bind r set-window-option synchronize-panes\; \
       display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

# ---- copy mode selection (restore vi defaults) ----
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ---- copy via OSC 52 / pbcopy ----
yank="$HOME/dev/personal-configs/tmux/yank.sh"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "$yank"
bind -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "$yank"

# ---- status line ----
set -g status-position bottom
set -g status-justify left
